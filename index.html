<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Link - Signature Series</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --cyber-black: #050505;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--cyber-black);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        /* --- SECTION 1: ANIMATED CIRCUIT BACKGROUND --- */
        .header-container {
            position: relative;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-bottom: 2px solid var(--neon-blue);
        }

        .circuit-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.4;
        }

        /* Moving circuit lines animation */
        .circuit-line {
            stroke: var(--neon-blue);
            stroke-width: 2;
            fill: none;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: dash 10s linear infinite;
        }

        @keyframes dash {
            to { stroke-dashoffset: 0; }
        }

        h1 {
            position: relative;
            z-index: 2;
            font-size: 4rem;
            text-transform: uppercase;
            letter-spacing: 10px;
            text-shadow: 0 0 20px var(--neon-blue);
            margin: 0;
        }

        /* --- SECTION 2: DRINK CAROUSEL --- */
        .carousel-container {
            padding: 50px 0;
            display: flex;
            overflow-x: auto;
            gap: 30px;
            padding-left: 50px;
            scrollbar-width: none;
        }

        .carousel-container::-webkit-scrollbar { display: none; }

        .drink-card {
            min-width: 250px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s;
        }

        .drink-card:hover {
            transform: translateY(-10px);
            border-color: var(--neon-blue);
        }

        .drink-card img {
            width: 180px; /* Uniform bottle size */
            height: 350px;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(0,242,255,0.5));
        }

        .drink-card h3 { margin: 15px 0 5px; color: var(--neon-blue); }
        .drink-card p { font-size: 0.9rem; opacity: 0.8; }

        /* --- SECTION 3: CIRCLE CHATBOT --- */
        #chat-bot {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, var(--neon-blue), var(--neon-purple));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 30px var(--neon-blue);
            font-weight: bold;
            transition: all 0.3s ease;
            z-index: 100;
            text-align: center;
            border: 4px solid white;
        }

        #chat-bot:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px var(--neon-purple);
        }

        #chat-bot:active { transform: scale(0.9); }

        .bot-status {
            position: absolute;
            bottom: -30px;
            width: 250px;
            right: 0;
            text-align: right;
            font-style: italic;
            color: var(--neon-blue);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <svg class="circuit-bg" viewBox="0 0 1000 300">
            <path class="circuit-line" d="M0,50 L200,50 L250,100 L400,100 L450,50 L800,50 L850,100 L1000,100" />
            <path class="circuit-line" style="animation-delay: -2s;" d="M0,250 L150,250 L200,200 L500,200 L550,250 L1000,250" />
            <path class="circuit-line" style="animation-delay: -5s;" d="M100,0 L100,150 L150,200 L300,200" />
            <path class="circuit-line" style="animation-delay: -7s;" d="M900,300 L900,150 L850,100 L700,100" />
            <circle cx="250" cy="100" r="3" fill="cyan" />
            <circle cx="500" cy="200" r="3" fill="cyan" />
        </svg>
        <h1>Infinity Link</h1>
    </div>

    <div class="carousel-container" id="carousel">
        </div>

    <div id="chat-bot" onclick="startNectarChat()">
        WELCOME
        <div class="bot-status" id="bot-output">Tap to find your mood...</div>
    </div>

    <script>
        // Drink Database from your Specs
        const drinks = [
            { name: "Kaleb Moon", img: "kalebmoon.png", mood: "wellness", desc: "Electric Blue Nebula" },
            { name: "Maia Gold", img: "maiagold.png", mood: "healing", desc: "Anti-Inflammatory Elixir" },
            { name: "Neon Green", img: "neongreen.png", mood: "clarity", desc: "Metabolism Kick" },
            { name: "Electric Yuzu", img: "electricyuzu.png", mood: "recovery", desc: "Electrolyte Tonic" },
            { name: "Ruby Rush", img: "rubyrush.png", mood: "energy", desc: "Power Cycle" },
            { name: "Purple Rain", img: "purplerain.png", mood: "restoration", desc: "Longevity Antioxidant" },
            { name: "Zero Latency", img: "zerolatency.png", mood: "focus", desc: "Nootropic Cold Brew" },
            { name: "Blue Matcha Bolt", img: "bluemacha.png", mood: "calm", desc: "Cognitive Calm" },
            { name: "Biscoff Brain-Boost", img: "biscoffbrain.png", mood: "reward", desc: "Neuro-Regenerative" },
            { name: "Salted Caramel Surge", img: "saltedcaramel.png", mood: "stress", desc: "Cortisol Crusher" }
        ];

        // Populate Carousel
        const carousel = document.getElementById('carousel');
        drinks.forEach(drink => {
            carousel.innerHTML += `
                <div class="drink-card">
                    <img src="${drink.img}" alt="${drink.name}">
                    <h3>${drink.name}</h3>
                    <p>${drink.desc}</p>
                </div>
            `;
        });

        // --- CHATBOT LOGIC ---
        const botOutput = document.getElementById('bot-output');

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.pitch = 1.2;
            utterance.rate = 1;
            window.speechSynthesis.speak(utterance);
        }

        function startNectarChat() {
            speak("What mood do you require?");
            botOutput.innerText = "Listening for mood...";

            const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Recognition) {
                alert("Speech recognition not supported in this browser.");
                return;
            }

            const recognition = new Recognition();
            recognition.start();

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript.toLowerCase();
                botOutput.innerText = `You said: "${transcript}"`;
                recommendDrink(transcript);
            };
        }

        function recommendDrink(input) {
            let recommendation = "I suggest a fresh water. Try saying energy, focus, or stress.";
            
            if (input.includes("focus") || input.includes("study")) {
                recommendation = "For peak performance, I recommend Zero Latency. It's a nootropic cold brew with zero crash.";
            } else if (input.includes("energy") || input.includes("tired")) {
                recommendation = "You need Ruby Rush. Pomegranate and Guarana to revitalize your system.";
            } else if (input.includes("stress") || input.includes("anxious")) {
                recommendation = "Calm your system with Salted Caramel Surge. The Ashwagandha will crush your cortisol levels.";
            } else if (input.includes("mood") || input.includes("happy")) {
                recommendation = "Try the Kaleb Moon. It's a wellness boost that looks like a blue nebula.";
            } else if (input.includes("calm") || input.includes("relax")) {
                recommendation = "The Blue Matcha Bolt is your best choice for cognitive calm.";
            }

            speak(recommendation);
            botOutput.innerText = "Recommendation sent.";
        }
    </script>
</body>
</html>
