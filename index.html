<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Link | Virtual Access Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f2ff;
            --magenta: #ff00ff;
            --purple: #7000ff;
            --bg: #000000;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- HERO & CIRCUIT SECTION --- */
        .hero-container {
            position: relative;
            width: 100%;
            height: 400px;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #circuitCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.8;
        }

        .glow-title {
            position: relative;
            z-index: 2;
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            color: var(--cyan);
            text-shadow: 0 0 20px var(--cyan), 0 0 40px var(--cyan);
            text-align: center;
        }

        /* --- FLOATING AI AGENT HUD --- */
        #link-agent {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 320px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid var(--cyan);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
            z-index: 10000;
            font-family: 'Orbitron', sans-serif;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
        }

        #agent-header {
            background: var(--cyan);
            color: black;
            padding: 8px;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        #chat-box {
            padding: 15px;
            max-height: 350px;
            overflow-y: auto;
            border-bottom: 1px solid #333;
        }

        .agent-msg {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.95rem;
            margin-bottom: 12px;
            line-height: 1.4;
            color: #e0e0e0;
        }

        .diagnostic-options button {
            display: block;
            width: 100%;
            background: transparent;
            border: 1px solid var(--magenta);
            color: var(--magenta);
            padding: 10px;
            margin-top: 8px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .diagnostic-options button:hover {
            background: var(--magenta);
            color: white;
            box-shadow: 0 0 15px var(--magenta);
        }

        /* Responsive Fix for Mobile */
        @media (max-width: 600px) {
            #link-agent {
                width: 90%;
                left: 5%;
                bottom: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="hero-container">
        <canvas id="circuitCanvas"></canvas>
        <h1 class="glow-title">INFINITY LINK</h1>
    </div>

    <div id="link-agent">
        <div id="agent-header">SYSTEM INTELLIGENCE: THE LINK</div>
        <div id="chat-box">
            <p class="agent-msg">System Initialized... <br>Welcome to the Virtual Access Hub.</p>
            <p class="agent-msg">Analyze optimization requirements:</p>
            <div class="diagnostic-options" id="options">
                <button onclick="diagnose('performance')">[ PERFORMANCE ]</button>
                <button onclick="diagnose('cognitive')">[ COGNITIVE FOCUS ]</button>
                <button onclick="diagnose('recovery')">[ SYSTEM RECOVERY ]</button>
            </div>
        </div>
    </div>

    <script>
        /* --- CIRCUIT ANIMATION LOGIC --- */
        const canvas = document.getElementById('circuitCanvas');
        const ctx = canvas.getContext('2d');
        let w, h;

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = 400;
        }
        window.addEventListener('resize', resize);
        resize();

        const lines = [];
        const colors = ['#00f2ff', '#ff00ff', '#7000ff'];

        class Line {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.speed = 0.5 + Math.random() * 1.5;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.dir = Math.random() > 0.5 ? 'h' : 'v';
                this.length = 15 + Math.random() * 30;
            }
            draw() {
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                if(this.dir === 'h') ctx.lineTo(this.x + this.length, this.y);
                else ctx.lineTo(this.x, this.y + this.length);
                ctx.stroke();
            }
            update() {
                if(this.dir === 'h') this.x += this.speed;
                else this.y += this.speed;
                if(this.x > w || this.y > h) this.reset();
            }
        }

        for(let i=0; i<30; i++) lines.push(new Line());

        function loop() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, w, h);
            lines.forEach(l => { l.update(); l.draw(); });
            requestAnimationFrame(loop);
        }
        loop();

        /* --- AGENT DIAGNOSTIC LOGIC --- */
        function diagnose(goal) {
            const chat = document.getElementById('chat-box');
            let res = "";
            let drink = "";

            if(goal === 'performance') {
                drink = "THE REDLINE";
                res = "Citrulline Malate activation sequence required. Directing to IL-SIG-06.";
            } else if(goal === 'cognitive') {
                drink = "ZERO LATENCY";
                res = "C8 MCT Oil & L-Theanine neural bridge suggested. Engaging IL-NN-01.";
            } else if(goal === 'recovery') {
                drink = "PURPLE RAIN";
                res = "Trans-Resveratrol antioxidant flush initiated. Initializing IL-SIG-07.";
            }

            chat.innerHTML += `<p class='agent-msg' style='color:var(--cyan)'> > Goal: ${goal.toUpperCase()}</p>`;
            chat.innerHTML += `<p class='agent-msg'>System Recommendation: <strong>${drink}</strong>. ${res}</p>`;
            chat.scrollTop = chat.scrollHeight; // Auto-scrolls to bottom
        }
    </script>
</body>
</html>
