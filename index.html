<!DOCTYPE html>
<html>
<head>
    <title>Infinity Link | Members Lounge</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            background: radial-gradient(circle, #2e2e2e, #000);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 90%;
            max-height: 95vh;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
            text-align: center;
            border: 8px solid #c0c0c0; /* Slightly thinner silver border */
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 8vw; /* Reduced from 12vw to fit mobile better */
            line-height: 1.2;
            margin: 0;
            font-family: serif;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 0 0 15px #d4af37;
        }

        .quote-box {
            border-left: 3px solid #c0c0c0;
            padding: 10px 15px;
            margin: 15px 5%;
            background: rgba(255,255,255,0.05);
        }

        .quote-text {
            font-size: 4.5vw; /* Scaled down for readability */
            color: #fff;
            font-style: italic;
            margin: 0;
        }

        .personal-note {
            color: #d4af37;
            font-size: 3vw;
            margin-bottom: 10px;
        }

        .login-btn {
            background: linear-gradient(45deg, #cd7f32, #ffd700);
            color: #000;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            border: 1px solid #fff;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome To<br>Members Lounge</h1>
        <br>

        <div class="quote-box">
            <p class="quote-text">
                "At Infinity Link, we build a world where your presence is the power."
            </p>
        </div>

        <p class="personal-note">
                 </p>

        <a href="infinitylink.html" class="login-btn">Secure Login</a>
    </div>
</body>
</html>
