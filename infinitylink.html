<!DOCTYPE html>
<html>
<head>
    <title>Infinity Link | Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
       :root {
    --stone-grey: #4A4E51;
    --pale-blue: #B0C4DE; /* The original pale blue */
    --pure-black: #000000;
}

body {
    background-color: var(--pure-black); /* Keeping your black background */
    color: white;
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
}

/* Multicoloured Running Text Title */
.running-text {
    font-weight: 900;
    font-size: 2.2rem;
    text-transform: uppercase;
    letter-spacing: 4px;
    margin: 0;
    background: linear-gradient(
        to right, 
        #B0C4DE, #87CEEB, #DDA0DD, #F0E68C, #B0C4DE
    );
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shine 4s linear infinite;
}

@keyframes shine {
    to { background-position: 200% center; }
}

header {
    text-align: center;
    margin-top: 5vh;
    margin-bottom: 40px;
}

/* Architect note */
.architect-note {
    color: var(--pale-blue);
    opacity: 0.9;
    font-weight: bold;
    margin-top: 10px;
    letter-spacing: 1px;
}

/* 3x2 Vertical Grid */
.grid-container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 20px;
    width: 95%;
    max-width: 400px;
}

.grid-item {
    background: var(--stone-grey); /* Stone Grey for buttons */
    border: 1px solid rgba(176, 196, 222, 0.2); /* Subtle blue border */
    border-radius: 15px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 25px 10px;
    text-decoration: none;
    text-align: center;
    font-weight: 600;
    font-size: 0.95rem;
    box-shadow: 0 4px 15px rgba(255, 255, 255, 0.05); /* Subtle white glow */
    transition: all 0.3s ease;
}

/* Text is Metallic Gold */
.grid-item {
    color: #d4af37; /* Metallic Gold */
}

/* Symbols/Icons are Pale Blue */
.icon-svg {
    width: 40px;
    height: 40px;
    margin-bottom: 12px;
    stroke: var(--pale-blue); /* Pale Blue symbol */
    fill: none;
}

/* Update Active state for better contrast */
.grid-item:active {
    background: #d4af37;
    color: var(--pure-black);
}

.grid-item:active .icon-svg {
    stroke: var(--pure-black); /* Symbol turns black when pressed for visibility */
}
    </style>
</head>
<body>


   <header style="text-align: center; padding: 20px 0; background-color: rgba(0,0,0,0.8); border-bottom: 2px solid #C0C0C0;">

</header>

<div class="grid-container">

        Programs
    </a>
    <a href="bookapod.html" class="grid-item">
        <svg class="icon-svg" viewBox="0 0 24 24" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
        Cyber Lounge
    </a>

    <a href="buyajuice.html" class="grid-item">
        <svg class="icon-svg" viewBox="0 0 24 24" stroke-width="2"><path d="M18 8h1a4 4 0 0 1 0 8h-1"></path><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path><line x1="6" y1="1" x2="6" y2="4"></line><line x1="10" y1="1" x2="10" y2="4"></line><line x1="14" y1="1" x2="14" y2="4"></line></svg>
        Juice Bar
    </a>
    <a href="experience.html" class="grid-item">
        <svg class="icon-svg" viewBox="0 0 24 24" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
        Infinity Private

    <a href="#" class="grid-item">
        <svg class="icon-svg" viewBox="0 0 24 24" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>

        Member Profile
    </a>
</div>

</body>
</html>
