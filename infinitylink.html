<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Link Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #000;
            color: #FFD700; /* Gold text */
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header {
            text-align: center;
            width: 100%;
            max-width: 400px; /* Matches the grid width */
        }

        .logo-container img {
            width: 250px; /* Sized to look balanced */
            height: auto;
        }

        .divider {
            width: 100%; /* Spans the full 400px width */
            height: 1px; /* Thinner line for a cleaner look */
            background-color: #555;
            margin: 25px auto; /* Centers the line with even spacing */
        }

        /* Grid Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        /* Card Styling */
        .card {
            background-color: #3e4247; /* Slightly darker grey for depth */
            border-radius: 25px;
            padding: 30px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #FFD700;
            transition: transform 0.2s;
        }

        .card:active {
            transform: scale(0.95);
        }

        .card i {
            font-size: 45px; /* Slightly larger icons */
            margin-bottom: 15px;
            color: #ADD8E6; /* Light blue icons */
        }

        .card span {
            font-weight: bold;
            font-size: 14px;
            text-align: center;
        }

    </style>
</head>
<body>

    <div class="header">
        <div class="logo-container">
            <img src="infinitylogo1.png" alt="Infinity Link The Ecosystem">
        </div>
        <div class="divider"></div>
    </div>

    <div class="dashboard-grid">
        
        <a href="programs.html" class="card">
            <i class="fas fa-book-open"></i>
            <span>Programs</span>
        </a>

        <a href="cyberlounge.html" class="card">
            <i class="fas fa-columns"></i>
            <span>Cyber Lounge</span>
        </a>

        <a href="juicebar.html" class="card">
            <i class="fas fa-coffee"></i>
            <span>Juice Bar</span>
        </a>

        <a href="infinityprivate.html" class="card">
            <i class="fas fa-lock"></i>
            <span>Infinity Private</span>
        </a>

        <a href="myparty.html" class="card">
            <i class="fas fa-calendar-alt"></i>
            <span>Social Events</span>
        </a>

        <a href="profile.html" class="card">
            <i class="fas fa-user"></i>
            <span>Member Profile</span>
        </a>

    </div>

</body>
</html>
